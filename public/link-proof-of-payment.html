<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comprobante de Recarga — Slan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --red:       #E8262A;
      --red-faint: #FFF0F0;
      --black:     #111111;
      --gray-900:  #1A1A1A;
      --gray-600:  #5A5A5A;
      --gray-400:  #9A9A9A;
      --gray-200:  #EBEBEB;
      --gray-100:  #F6F6F6;
      --white:     #FFFFFF;
      --font-sans: 'DM Sans', sans-serif;
      --font-mono: 'DM Mono', monospace;
      --radius-md: 16px;
      --radius-lg: 24px;
      --shadow-card: 0 4px 24px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.06);
      --shadow-btn:  0 2px 12px rgba(232,38,42,0.30);
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }

    body {
      font-family: var(--font-sans);
      background: var(--gray-100);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      color: var(--black);
    }

    .page-wrapper {
      width: 100%;
      max-width: 420px;
      animation: fadeUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) both;
    }

    .card {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .card__header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--gray-100);
    }

    .brand { display: flex; align-items: center; gap: 1px; }
    .brand__text {
      font-weight: 700; font-size: 1.25rem;
      letter-spacing: -0.04em; color: var(--black); text-transform: lowercase;
    }
    .brand__circle {
      font-size: 0.6rem; font-weight: 700; color: var(--red);
      line-height: 1; margin-top: -8px;
    }

    .card__body {
      padding: 24px 24px 20px;
      display: flex; flex-direction: column; gap: 20px;
    }

    .receipt-title-block { display: flex; flex-direction: column; gap: 10px; }

    .receipt-title {
      font-size: clamp(1.2rem, 4vw, 1.45rem);
      font-weight: 700; line-height: 1.25;
      letter-spacing: -0.02em; color: var(--black);
    }

    .status-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: #ECFDF5; color: #047857;
      font-size: 0.73rem; font-weight: 600;
      letter-spacing: 0.03em; text-transform: uppercase;
      padding: 4px 10px; border-radius: 100px; width: fit-content;
    }
    .status-dot {
      width: 6px; height: 6px; background: #10B981;
      border-radius: 50%; animation: pulse 2s infinite;
    }

    .datetime-block {
      display: flex; align-items: center; flex-wrap: wrap; gap: 8px;
    }
    .datetime-item {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.82rem; color: var(--gray-600);
    }
    .datetime-item svg { flex-shrink: 0; color: var(--gray-400); }
    .datetime-separator { color: var(--gray-400); font-size: 1rem; line-height: 1; }
    .tz-tag {
      background: var(--gray-100); color: var(--gray-600);
      font-size: 0.68rem; font-weight: 600; letter-spacing: 0.05em;
      padding: 2px 6px; border-radius: 4px;
    }

    .divider { height: 1px; background: var(--gray-200); border-radius: 1px; }

    .detail-list {
      display: flex; flex-direction: column;
      border: 1px solid var(--gray-200); border-radius: var(--radius-md); overflow: hidden;
    }
    .detail-row {
      display: flex; align-items: center;
      justify-content: space-between; gap: 12px;
      padding: 14px 18px; background: var(--white);
    }
    .detail-row + .detail-row { border-top: 1px solid var(--gray-200); }
    .detail-row--highlight    { background: var(--gray-100); }

    .detail-label { font-size: 0.88rem; color: var(--gray-600); font-weight: 500; flex-shrink: 0; }
    .detail-value { font-size: 0.88rem; font-weight: 600; color: var(--black); text-align: right; }
    .detail-value--amount {
      font-size: 1.3rem; font-weight: 700; color: var(--red); letter-spacing: -0.02em;
    }
    .currency { font-size: 0.8rem; font-weight: 600; color: var(--gray-400); margin-left: 3px; }

    .btn-download {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 14px 20px;
      background: transparent; border: 2px solid var(--red); border-radius: var(--radius-md);
      color: var(--red); font-family: var(--font-sans);
      font-size: 0.95rem; font-weight: 700; letter-spacing: 0.01em;
      cursor: pointer; position: relative; overflow: hidden;
      transition: color var(--transition), box-shadow var(--transition), transform var(--transition);
    }
    .btn-download::before {
      content: ''; position: absolute; inset: 0; background: var(--red);
      transform: scaleX(0); transform-origin: left;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 0;
    }
    .btn-download:hover::before { transform: scaleX(1); }
    .btn-download:hover         { color: var(--white); box-shadow: var(--shadow-btn); }
    .btn-download:active        { transform: scale(0.97); }
    .btn-download span, .btn-download svg { position: relative; z-index: 1; }
    .btn-download svg           { transition: transform 0.25s ease; }
    .btn-download:hover svg     { transform: translateY(2px); }

    .card__footer {
      background: var(--red); padding: 22px 24px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .footer-company {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.82rem; font-weight: 700; color: rgba(255,255,255,0.95); letter-spacing: 0.01em;
    }
    .footer-icon { flex-shrink: 0; color: rgba(255,255,255,0.7); }
    .footer-ref  { display: flex; flex-direction: column; gap: 4px; }
    .footer-ref-label {
      font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: rgba(255,255,255,0.6);
    }
    .footer-ref-value {
      font-family: var(--font-mono); font-size: 0.8rem;
      color: rgba(255,255,255,0.9); letter-spacing: 0.03em; word-break: break-all;
    }

    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--gray-900); color: var(--white);
      font-size: 0.82rem; font-weight: 600; padding: 10px 18px;
      border-radius: 100px; display: flex; align-items: center; gap: 7px;
      white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.20);
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.4s ease;
      opacity: 0; pointer-events: none; z-index: 100;
    }
    .toast svg       { color: #10B981; flex-shrink: 0; }
    .toast--visible  { transform: translateX(-50%) translateY(0) !important; opacity: 1 !important; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.85); }
    }

    @media (max-width: 400px) {
      .card__header, .card__body, .card__footer { padding-left: 18px; padding-right: 18px; }
      .detail-row { padding: 12px 14px; }
      .datetime-block { flex-direction: column; align-items: flex-start; gap: 4px; }
      .datetime-separator { display: none; }
    }
    @media (min-width: 480px) { body { padding: 40px 24px; } }
  </style>
</head>
<body>

<div class="page-wrapper">
  <div class="card" id="comprobante">

    <!-- Header -->
    <div class="card__header">
      <div class="brand">
        <span class="brand__text">slan</span>
        <span class="brand__circle">®</span>
      </div>
    </div>

    <!-- Body -->
    <div class="card__body">

      <div class="receipt-title-block">
        <h1 class="receipt-title">Comprobante de transferencia por link de pago</h1>
        <div class="status-badge">
          <span class="status-dot"></span>
          Completado
        </div>
      </div>

      <div class="datetime-block">
        <div class="datetime-item">
          <!-- calendar icon -->
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          <span id="fecha">{{fecha}}</span>
        </div>
        <div class="datetime-separator">·</div>
        <div class="datetime-item">
          <!-- clock icon -->
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
          <span id="hora">{{hora}}</span>
          <span class="tz-tag">{{timezone}}</span>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Details -->
      <div class="detail-list">
        <div class="detail-row">
          <span class="detail-label">Nombre de receptor</span>
          <span class="detail-value" id="receptor">{{receptor}}</span>
        </div>
        <div class="detail-row detail-row--highlight">
          <span class="detail-label">Monto</span>
          <span class="detail-value detail-value--amount" id="monto">
            {{monto}} <span class="currency">{{moneda}}</span>
          </span>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Download -->
      <button class="btn-download" id="btnDownload">
        <span>Descargar comprobante</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </button>

    </div>

    <!-- Footer -->
    <div class="card__footer">
      <div class="footer-company">
        <svg class="footer-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>{{empresa}}</span>
      </div>
      <div class="footer-ref">
        <span class="footer-ref-label">Referencia interna</span>
        <span class="footer-ref-value" id="referencia">{{referencia}}</span>
      </div>
    </div>

  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="20 6 9 17 4 12"/>
  </svg>
  Comprobante descargado
</div>

<script>
  // Data injected server-side via template interpolation
  const DATA = {
    receptor:   '{{receptor}}',
    monto:      '{{monto}}',
    moneda:     '{{moneda}}',
    fecha:      '{{fecha}}',
    hora:       '{{hora}}',
    timezone:   '{{timezone}}',
    referencia: '{{referencia}}',
    empresa:    '{{empresa}}',
  };

  // ── Toast ─────────────────────────────────
  let toastTimer = null;
  function showToast(msg) {
    const toast = document.getElementById('toast');
    const nodes = [...toast.childNodes].filter(n => n.nodeType === Node.TEXT_NODE);
    if (nodes.length) nodes[nodes.length - 1].nodeValue = ' ' + msg;
    toast.classList.add('toast--visible');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('toast--visible'), 2800);
  }

  // ── Generate receipt text ─────────────────
  function generateReceiptText() {
    return [
      '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━',
      '       COMPROBANTE DE RECARGA',
      '       con link de pago',
      '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━',
      '',
      `Fecha:              ${DATA.fecha}`,
      `Hora (${DATA.timezone}):   ${DATA.hora}`,
      '',
      `Nombre de receptor: ${DATA.receptor}`,
      `Monto:              ${DATA.monto} ${DATA.moneda}`,
      '',
      '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━',
      DATA.empresa,
      '',
      `Referencia interna: ${DATA.referencia}`,
      '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━',
    ].join('\n');
  }

  // ── Download ──────────────────────────────
  document.getElementById('btnDownload').addEventListener('click', function () {
    if (this.disabled) return;
    this.disabled = true;

    const icon = this.querySelector('svg');
    icon.style.transition = 'transform 0.4s cubic-bezier(0.34,1.56,0.64,1)';
    icon.style.transform  = 'translateY(4px)';

    const btn = this;
    setTimeout(() => {
      icon.style.transform = 'translateY(0)';
      const blob = new Blob([generateReceiptText()], { type: 'text/plain;charset=utf-8' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = `comprobante-${DATA.referencia}.txt`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('Comprobante descargado');
      btn.disabled = false;
    }, 350);
  });

  // ── Copy reference ────────────────────────
  const refEl = document.getElementById('referencia');
  refEl.style.cursor = 'pointer';
  refEl.title = 'Copiar referencia';
  refEl.addEventListener('click', () => {
    navigator.clipboard.writeText(DATA.referencia)
      .then(() => showToast('Referencia copiada'))
      .catch(() => showToast('Selecciona y copia la referencia'));
  });
</script>

</body>
</html>
