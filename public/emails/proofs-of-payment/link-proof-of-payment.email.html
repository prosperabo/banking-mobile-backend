<!DOCTYPE html>
<html lang="es" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="format-detection" content="telephone=no, date=no, address=no, email=no" />
  <title>Comprobante de recarga — Slan</title>
  <style type="text/css">
    body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td          { mso-table-lspace: 0pt; mso-table-rspace: 0pt; border-collapse: collapse; }
    img                { border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; -ms-interpolation-mode: bicubic; }
    body               { margin: 0 !important; padding: 0 !important; width: 100% !important; }

    .btn-download:hover { background-color: #FF2B2B !important; color: #ffffff !important; }

    @media only screen and (max-width: 520px) {
      .email-container { width: 100% !important; min-width: unset !important; }
      .mobile-pad      { padding-left: 24px !important; padding-right: 24px !important; }
      .footer-pad      { padding: 32px 24px !important; }
    }
  </style>
</head>

<body style="margin:0;padding:0;background-color:#F2F2F2;font-family:Arial,Helvetica,sans-serif;">

<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0"
        style="background-color:#F2F2F2;">
  <tr>
    <td align="center" valign="top" style="padding:40px 16px;">

      <table role="presentation" class="email-container" width="480" cellpadding="0"
              cellspacing="0" border="0"
              style="width:480px;background-color:#ffffff;border:2px solid #111111;">

        <!-- ── HEADER ── -->
        <tr>
          <td class="mobile-pad"
              style="padding:24px 32px 16px 32px;background-color:#ffffff;">
            <table role="presentation" cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td style="font-family:Arial,Helvetica,sans-serif;font-size:22px;
                            font-weight:800;letter-spacing:-1.5px;color:#111111;
                            line-height:1;text-transform:lowercase;">
                  <svg width="60" height="17" viewBox="0 0 60 17" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M8.37182 1.05229C10.2555 0.982519 12.5288 1.60461 13.43 1.92438L13.5172 5.936H10.9009V4.54065L9.50554 4.27903H7.32531C6.74391 4.27903 5.58112 4.50577 5.58112 5.41275C5.58112 6.31972 6.86019 6.60461 7.49973 6.63368C7.5288 6.63368 8.09275 6.66856 10.116 6.8081C12.6451 6.98252 13.3428 7.94182 13.5172 8.02903C13.6916 8.11624 14.3893 9.42438 14.3893 10.5581C14.3893 11.4651 13.8079 12.6802 13.5172 13.1744C13.0811 13.7558 11.4939 14.9186 8.63345 14.9186C5.77298 14.9186 3.72066 14.3953 3.05205 14.1337V9.86042H5.66833V11.4302L8.63345 11.779C9.59275 11.8372 11.5288 11.6569 11.5986 10.4709C11.6683 9.28484 8.95322 9.10461 7.58694 9.16275C6.91833 9.13368 5.31949 8.91856 4.27298 8.29065C2.96484 7.50577 2.96484 5.67438 2.96484 5.32554C2.96484 4.9767 2.96484 3.40693 3.92415 2.53484C4.88345 1.66275 6.01717 1.1395 8.37182 1.05229Z" fill="#181110"/>
                    <path d="M19.6225 11.1632L24.1574 1.22129V1.04688H19.7969L15.1748 11.2504H19.3609L17.7039 15.0004H26.4248L28.169 11.1632H19.6225Z" fill="#181110"/>
                    <path d="M49.25 0.0107422C53.489 0.225878 56.8604 3.73096 56.8604 8.02344L56.8496 8.43652C56.6345 12.6755 53.1293 16.0467 48.8369 16.0469L48.4238 16.0361C44.3215 15.8282 41.0324 12.5388 40.8242 8.43652L40.8135 8.02344C40.8135 3.59232 44.4058 0 48.8369 0L49.25 0.0107422ZM48.8369 1.74414C45.3691 1.74414 42.5576 4.5556 42.5576 8.02344C42.5577 11.4912 45.3691 14.3027 48.8369 14.3027C52.3046 14.3026 55.1161 11.4911 55.1162 8.02344C55.1162 4.55569 52.3046 1.74429 48.8369 1.74414ZM50.5811 8.7207V3.66309H52.5V12.21H50.4941L47.1797 7.32617L47.0928 12.21H45.1738V3.66309H47.2666L50.5811 8.7207Z" fill="#181110"/>
                    <path d="M35.1445 1.04688C36.9584 1.0469 38.4592 1.80276 38.9824 2.18066L39.7666 3.66309L39.0693 11.8604H40.8135L40.4648 14.8262H36.3662L36.6279 12.7324C36.1918 13.4883 34.7436 15 32.4414 15C30.1393 15 29.1567 13.256 28.9531 12.3838V9.94238C29.0984 9.47736 29.4764 8.47753 29.8252 8.19824C30.2612 7.84944 31.569 6.97701 32.5283 6.88965C33.2958 6.81989 35.9294 6.80274 37.1504 6.80273V5.40723C36.9469 4.91304 36.1387 3.95914 34.5342 4.09863C32.5289 4.27301 30.6976 4.44746 30.5225 4.70898L30.8721 1.74414C31.541 1.51154 33.3311 1.04694 35.1445 1.04688ZM32.7959 8.89551C32.3077 8.89563 31.9532 9.18671 31.8369 9.33203C31.7206 9.47763 31.4711 9.92517 31.4014 10.5527C31.3143 11.3376 32.1861 12.21 33.4941 12.21C34.5406 12.2098 36.0234 11.3952 36.6338 10.9883L36.8076 8.89551H32.7959Z" fill="#181110"/>
                  </svg>
                </td>
              </tr>
            </table>
          </td>
        </tr>

        <tr>
          <td class="mobile-pad"
              style="padding:16px 32px 48px 32px;background-color:#ffffff;">

            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td style="padding-bottom:24px;">
                  <p style="margin:0;font-family:Arial,Helvetica,sans-serif;
                              font-size:28px;font-weight:800;line-height:1.2;
                              color:#111111;letter-spacing:-0.5px;">
                    Comprobante de recarga con<br />link de pago
                  </p>
                </td>
              </tr>
            </table>

            <!-- Datetime -->
            <table role="presentation" cellpadding="0" cellspacing="0" border="0"
                    style="margin-bottom:48px;">
              <tr>
                <td style="font-family:Arial,Helvetica,sans-serif;font-size:18px;
                            color:#333333;padding-bottom:16px;">
                  {{date}}
                </td>
              </tr>
              <tr>
                <td style="font-family:Arial,Helvetica,sans-serif;font-size:18px;
                            color:#333333;">
                  {{time}} (hora de {{timezone}})
                </td>
              </tr>
            </table>

            <table role="presentation" width="100%" cellpadding="0" cellspacing="0"
                    border="0" style="margin-bottom:48px;">
              <tr>
                <td style="padding:16px 0;font-family:Arial,Helvetica,sans-serif;
                            font-size:18px;font-weight:700;color:#111111;
                            width:50%;vertical-align:middle;">
                  Nombre de receptor
                </td>
                <td align="right"
                    style="padding:16px 0;font-family:Arial,Helvetica,sans-serif;
                            font-size:18px;color:#444444;text-align:right;
                            vertical-align:middle;">
                  {{recipient}}
                </td>
              </tr>
              <tr>
                <td style="padding:16px 0;font-family:Arial,Helvetica,sans-serif;
                            font-size:18px;font-weight:700;color:#111111;
                            width:50%;vertical-align:middle;">
                  Monto
                </td>
                <td align="right"
                    style="padding:16px 0;font-family:Arial,Helvetica,sans-serif;
                            font-size:18px;color:#444444;text-align:right;
                            vertical-align:middle;">
                  {{amount}} {{currency}}
                </td>
              </tr>
            </table>

          </td>
        </tr>

        <tr>
          <td class="mobile-pad footer-pad"
              style="padding:48px 32px;background-color:#FF2B2B;">
            <p style="margin:0 0 32px 0;font-family:Arial,Helvetica,sans-serif;
                        font-size:15px;font-weight:700;color:#ffffff;letter-spacing:0.2px;">
              Prospera Fintech S.A.P.I. de C.V.
            </p>
            <p style="margin:0 0 8px 0;font-family:Arial,Helvetica,sans-serif;
                        font-size:15px;font-weight:700;color:#ffffff;">
              Referencia interna
            </p>
            <p style="margin:0;font-family:Arial,Helvetica,sans-serif;
                        font-size:14px;font-weight:400;
                        color:rgba(255,255,255,0.7);
                        letter-spacing:0.2px;word-break:break-all;">
              {{reference}}
            </p>
          </td>
        </tr>

      </table>

    </td>
  </tr>
</table>

</body>
</html>
